services:
  - type: web
    name: monreale-python-api
    env: python
    pythonVersion: 3.12.8
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: MICROSERVICE_API_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: ALLOWED_ORIGIN
        value: https://monreale-os-web.vercel.app
    plan: starter
    autoDeploy: true
